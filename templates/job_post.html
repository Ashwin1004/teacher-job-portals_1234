<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job | EduConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="/" class="sidebar-logo" style="text-decoration:none;">
                <i class="fa-solid fa-graduation-cap"></i> EduConnect
            </a>
            <div class="sidebar-menu">
                <a href="{{ url_for('recruiter_dashboard') }}"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="{{ url_for('post_job') }}" class="active"><i class="fa-solid fa-plus-circle"></i> Post a Job</a>
                <a href="{{ url_for('job_listing') }}"><i class="fa-solid fa-magnifying-glass"></i> View Jobs</a>
            </div>
            <div class="sidebar-footer">
                <a href="{{ url_for('logout') }}"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="dash-main">
            <div class="dash-topbar slide-up">
                <div>
                    <h1>Create a Job Posting</h1>
                    <p>Fill out the details below to attract top educators.</p>
                </div>
            </div>

            <div class="dash-section slide-up" style="animation-delay:0.1s">
                <div class="section-title">
                    <i class="fa-solid fa-file-signature" style="color:var(--primary)"></i> Job Listing Details
                </div>
                
                <form action="{{ url_for('post_job') }}" method="POST" class="dash-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Job Title / Position</label>
                            <input type="text" name="title" required placeholder="e.g. Senior Math Teacher">
                        </div>
                        <div class="form-group">
                            <label>Subject Area</label>
                            <input type="text" name="subject" required placeholder="e.g. Mathematics">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" name="location" required placeholder="e.g. New York, NY">
                        </div>
                        <div class="form-group">
                            <label>Salary Range (Optional)</label>
                            <input type="text" name="salary" placeholder="e.g. $60,000 - $80,000">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Full Job Description</label>
                        <textarea name="description" rows="6" required placeholder="Describe the responsibilities, requirements, and benefits..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn-primary" style="margin-top:1rem; font-size:1.1rem; padding: 0.8rem 2rem;">Publish Job Post</button>
                    <a href="{{ url_for('recruiter_dashboard') }}" class="btn-text" style="margin-left:1rem">Cancel</a>
                </form>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
